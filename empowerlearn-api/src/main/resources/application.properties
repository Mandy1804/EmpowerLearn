spring.application.name=EmpowerLearn-API

# ----------------------------------------------------
# CONFIGURAÇÕES DO SERVIDOR
# ----------------------------------------------------
server.port=${PORT:8080}

# ----------------------------------------------------
# CONFIGURAÇÕES DE CORS
# Em deploy, alterar CORS_ALLOWED_ORIGINS para a URL do frontend publicado.
# ----------------------------------------------------
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:5500,http://localhost:5500}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# ----------------------------------------------------
# CONFIGURAÇÕES DO BANCO DE DADOS
# Local: usa MySQL do Docker.
# Railway: usa variáveis MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER e MYSQLPASSWORD.
# ----------------------------------------------------
app.mysql.host=${MYSQLHOST:localhost}
app.mysql.port=${MYSQLPORT:3306}
app.mysql.database=${MYSQLDATABASE:empowerlearn_db}

spring.datasource.url=jdbc:mysql://${app.mysql.host}:${app.mysql.port}/${app.mysql.database}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:empoweruser}
spring.datasource.password=${MYSQLPASSWORD:empowerpass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------------------------------
# CONFIGURAÇÕES DO JPA / HIBERNATE
# ----------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false

# ----------------------------------------------------
# UPLOADS LOCAIS
# Futuramente vamos migrar para S3.
# ----------------------------------------------------
app.upload.dir=${UPLOAD_DIR:${user.dir}/uploads}
spring.web.resources.static-locations=file:${app.upload.dir}/,classpath:/static/,classpath:/public/
spring.mvc.static-path-pattern=/uploads/**

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ----------------------------------------------------
# JWT
# Em deploy, configurar JWT_SECRET no Railway.
# ----------------------------------------------------
jwt.secret=${JWT_SECRET:EmpowerLearnSecretKey2025SuperSegura123456789}


# ----------------------------------------------------
# STRIPE CHECKOUT - MVP
# Configure STRIPE_SECRET_KEY no terminal antes de subir o backend.
# Não salve sk_test_... no Git.
# ----------------------------------------------------
stripe.secret.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
app.frontend.base-url=${FRONTEND_BASE_URL:http://127.0.0.1:5500/EmpowerLearn}
