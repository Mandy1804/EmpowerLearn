spring.application.name=EmpowerLearn-API
# ----------------------------------------------------
# CONFIGURACOES DO SERVIDOR (Web e CORS)
# ----------------------------------------------------
server.port=8080
spring.web.cors.allowed-origins=http://localhost:8080, http://127.0.0.1:5500, file:///
spring.web.cors.allowed-methods=GET, POST, PUT, DELETE, OPTIONS
spring.web.cors.allowed-headers=*
# ----------------------------------------------------
# CONFIGURACOES DO BANCO DE DADOS (MYSQL/DOCKER)
# ----------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/empowerlearn_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=empoweruser
spring.datasource.password=empowerpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ----------------------------------------------------
# CONFIGURACOES DO JPA (Hibernate)
# ----------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Caminho ABSOLUTO para a pasta de uploads (evita ambiguidade de diretorio de trabalho)
spring.web.resources.static-locations=file:/Users/lorenzogazola/Documents/GitHub/EmpowerLearn-/EmpowerLearn/empowerlearn-api/uploads/,classpath:/static/,classpath:/public/
spring.mvc.static-path-pattern=/uploads/**
# Limite de tamanho de upload de arquivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=EmpowerLearnSecretKey2025SuperSegura123456789
spring.jpa.open-in-view=false
