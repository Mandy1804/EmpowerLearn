<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmpowerLearn - Minhas Contratações</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#4A00B7; --vibrant:#8B5CF6; --bg:#F0F2F5; --white:#fff; --text:#300090; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { display:flex; min-height:100vh; background:var(--bg); font-family:'Poppins',sans-serif; }
        .sidebar { width:280px; background:var(--primary); color:white; display:flex; flex-direction:column; justify-content:space-between; position:fixed; left:0; top:0; height:100vh; z-index:900; }
        .sidebar-top { display:flex; flex-direction:column; }
        .sidebar-logo { text-align:center; padding:20px; font-size:1.4em; font-weight:700; border-bottom:1px solid rgba(255,255,255,0.2); color:white; text-decoration:none; display:block; }
        .sidebar-nav { padding:20px 0; display:flex; flex-direction:column; }
        .sidebar-link { display:flex; align-items:center; gap:12px; padding:15px 30px; text-decoration:none; color:white; font-size:0.95em; cursor:pointer; transition:background 0.3s; }
        .sidebar-link:hover, .sidebar-link.active { background:var(--vibrant); }
        .sidebar-link svg { width:20px; height:20px; flex-shrink:0; stroke:white; fill:none; }
        .sidebar-logout { border-top:1px solid rgba(255,255,255,0.2); padding:20px 0; }
        .sidebar-logout .sidebar-link { color:#E74C3C; }
        .main-content { margin-left:280px; padding:40px; flex:1; }
        h1 { color:var(--text); margin-bottom:8px; }
        .subtitle { color:#888; margin-bottom:32px; }
        .card { background:white; border-radius:16px; padding:24px; box-shadow:0 4px 15px rgba(0,0,0,0.08); margin-bottom:20px; display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
        .avatar { width:64px; height:64px; border-radius:50%; background:var(--primary); color:white; display:flex; align-items:center; justify-content:center; font-size:1.5em; font-weight:700; flex-shrink:0; overflow:hidden; }
        .avatar img { width:100%;height:100%;object-fit:cover; }
        .info { flex:1; min-width:180px; }
        .info h3 { color:var(--text); margin-bottom:4px; }
        .badge { display:inline-block; background:var(--vibrant); color:white; border-radius:20px; padding:2px 10px; font-size:0.75em; margin-bottom:8px; }
        .stars { display:flex; gap:4px; font-size:1.4em; cursor:pointer; margin-top:6px; }
        .star { color:#ddd; transition:color 0.2s; }
        .star.ativa { color:#f5a623; }
        .feedback-msg { font-size:0.8em; color:var(--primary); margin-top:4px; }
        .btn-feedback { background:var(--primary); color:white; border:none; border-radius:8px; padding:8px 16px; cursor:pointer; font-size:0.85em; margin-top:8px; }
        .empty { text-align:center; color:#aaa; margin-top:80px; font-size:1.1em; }
    </style>
</head>
<body>
    <script src="js/config.js"></script>
    <aside class="sidebar" id="sidebar-menu">
        <div class="sidebar-top">
            <a href="../EmpowerLearn/daschboard-professor.html" class="sidebar-logo">EmpowerLearn</a>
            <nav class="sidebar-nav">
                <a href="../EmpowerLearn/daschboard-professor.html" class="sidebar-link"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Home</a>
                <a href="../EmpowerLearn/ver-perfil.html" class="sidebar-link"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Consultar Perfil</a>
                <a href="../EmpowerLearn/ver-curtidas.html" class="sidebar-link"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg> Ver Curtidas</a>
                <a href="../EmpowerLearn/historico-perfis.html" class="sidebar-link"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Histórico de Perfis</a>
                <a href="../EmpowerLearn/minhas-contratacoes.html" class="sidebar-link active"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Minhas Contratações</a>
            </nav>
        </div>
        <div class="sidebar-logout">
            <a href="#" onclick="if(confirm('Sair?')){localStorage.clear();window.location.href='login.html';}" class="sidebar-link"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg> Sair</a>
        </div>
    </aside>

    <main class="main-content">
        <h1>Minhas Contratações</h1>
        <p class="subtitle">Veja quem te contratou e avalie a experiência.</p>
        <div id="lista-contratantes"></div>
    </main>

    <script>
        const userId = localStorage.getItem('userId');
        const token = localStorage.getItem('token');
        const userType = localStorage.getItem('userType');
        const API = window.APP_CONFIG.API_BASE_URL;

        if (!userId || !token || userType !== 'professor') {
            window.location.href = 'login.html';
        }

        const contratantes = JSON.parse(localStorage.getItem('contratantes_prof_' + userId) || '[]');
        const feedbacks = JSON.parse(localStorage.getItem('feedbacks_prof_dados_' + userId) || '{}');

        async function carregarContratante(c) {
            try {
                const endpoint = c.tipo === 'instituicao' ? '/instituicoes/' : '/alunos/';
                const res = await fetch(API + endpoint + c.id, { headers: { 'Authorization': 'Bearer ' + token } });
                if (!res.ok) return null;
                return await res.json();
            } catch { return null; }
        }

        function renderEstrelas(cId, nota) {
            let html = '<div class="stars" id="stars_' + cId + '">';
            for (let i = 1; i <= 5; i++) {
                html += '<span class="star ' + (i <= nota ? 'ativa' : '') + '" onclick="setNota(' + cId + ', ' + i + ')">★</span>';
            }
            return html + '</div>';
        }

        window.setNota = function(cId, nota) {
            feedbacks[cId] = nota;
            localStorage.setItem('feedbacks_prof_dados_' + userId, JSON.stringify(feedbacks));
            document.querySelectorAll('#stars_' + cId + ' .star').forEach((s, i) => {
                s.classList.toggle('ativa', i < nota);
            });
            document.getElementById('msg_' + cId).textContent = 'Avaliação salva: ' + nota + '★';
        };

        async function render() {
            const lista = document.getElementById('lista-contratantes');
            if (!contratantes.length) {
                lista.innerHTML = '<p class="empty">Ninguém te contratou ainda.</p>';
                return;
            }
            for (const c of contratantes) {
                const dados = await carregarContratante(c);
                const nome = dados?.nome || c.nome || 'Usuário';
                const foto = dados?.fotoUrl ? window.APP_CONFIG.SERVER_BASE_URL + dados.fotoUrl : null;
                const nota = feedbacks[c.id] || 0;
                const badge = c.tipo === 'instituicao' ? '🏫 Instituição' : '🎓 Aluno';
                const avatarHtml = foto
                    ? '<img src="' + foto + '" alt="' + nome + '">'
                    : nome.charAt(0).toUpperCase();

                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = '<div class="avatar">' + avatarHtml + '</div>'
                    + '<div class="info">'
                    + '<h3>' + nome + '</h3>'
                    + '<span class="badge">' + badge + '</span>'
                    + '<p style="font-size:0.85em;color:#888;">' + (dados?.cidade || '') + (dados?.estado ? ' / ' + dados.estado : '') + '</p>'
                    + renderEstrelas(c.id, nota)
                    + '<p class="feedback-msg" id="msg_' + c.id + '">' + (nota ? 'Avaliação salva: ' + nota + '★' : 'Clique nas estrelas para avaliar') + '</p>'
                    + '</div>';
                lista.appendChild(div);
            }
        }

        render();
    </script>
</body>
</html>
