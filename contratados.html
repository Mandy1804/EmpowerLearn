<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmpowerLearn - Contratados</title>
    <link rel="stylesheet" href="../EmpowerLearn/css/style.css">
    <style>
        body { display:flex; min-height:100vh; background:#F0F2F5; margin:0; font-family:'Poppins',sans-serif; }
        .sidebar { width:280px; background:#4A00B7; color:white; padding:20px 0; display:flex; flex-direction:column; position:fixed; left:0; top:0; height:100vh; z-index:900; }
        .sidebar-logo { text-align:center; padding-bottom:30px; font-size:1.6em; font-weight:700; border-bottom:1px solid rgba(255,255,255,0.2); margin:0 20px; display:block; color:white; text-decoration:none; }
        .sidebar-link { display:flex; align-items:center; padding:15px 30px; text-decoration:none; color:white; font-size:0.95em; cursor:pointer; transition:background 0.3s; }
        .sidebar-link:hover, .sidebar-link.active { background:#8B5CF6; }
        .main-content { margin-left:280px; padding:40px; flex:1; }
        .card { background:white; border-radius:16px; padding:24px; box-shadow:0 4px 15px rgba(0,0,0,0.08); margin-bottom:20px; display:flex; align-items:center; gap:20px; }
        .avatar { width:64px; height:64px; border-radius:50%; background:#4A00B7; color:white; display:flex; align-items:center; justify-content:center; font-size:1.5em; font-weight:700; flex-shrink:0; overflow:hidden; }
        .avatar img { width:100%; height:100%; object-fit:cover; }
        .info { flex:1; }
        .info h3 { margin:0 0 4px; color:#300090; }
        .estrelas-container { display:flex; gap:6px; font-size:1.5em; cursor:pointer; margin-top:8px; }
        .est { color:#ccc; }
        .est.ativa { color:#f5a623; }
        .msg { font-size:0.8em; color:#4A00B7; margin-top:4px; }
        h1 { color:#300090; margin-bottom:30px; }
        .empty { text-align:center; color:#aaa; margin-top:60px; font-size:1.1em; }
    </style>
</head>
<body>
<aside class="sidebar">
    <a href="daschboard.html" class="sidebar-logo">EmpowerLearn</a>
    <nav style="flex-grow:1;padding:20px 0;">
        <a href="ver-perfil.html" class="sidebar-link">👤 Consultar Perfil</a>
        <a href="ver-curtidas.html" class="sidebar-link">❤️ Curtidas</a>
        <a href="historico-perfis.html" class="sidebar-link">🕘 Histórico de Perfis</a>
        <a href="contratados.html" class="sidebar-link active">✅ Contratados</a>
    </nav>
    <div style="border-top:1px solid rgba(255,255,255,0.2);padding-top:20px;">
        <a onclick="if(confirm('Sair?')){localStorage.clear();window.location.href='login.html';}" class="sidebar-link" style="color:#E74C3C;cursor:pointer;">🚪 Sair</a>
    </div>
</aside>

<main class="main-content">
    <h1>✅ Professores Contratados</h1>
    <div id="lista-contratados"></div>
</main>

<script>
    const userId = localStorage.getItem('userId');
    const token = localStorage.getItem('token');
    const userType = localStorage.getItem('userType');
    if (!userId || !token) window.location.href = 'login.html';

    const API = 'http://localhost:8080/api';
    const SERVER = 'http://localhost:8080';

    async function carregarContratados() {
        const contratados = JSON.parse(localStorage.getItem('contratados_' + userId) || '[]');
        const lista = document.getElementById('lista-contratados');

        if (contratados.length === 0) {
            lista.innerHTML = '<p class="empty">Você ainda não contratou nenhum professor.<br>Vá ao <a href="daschboard.html">Dashboard</a> para encontrar professores.</p>';
            return;
        }

        for (const c of contratados) {
            const card = document.createElement('div');
            card.className = 'card';

            // Busca dados do professor
            let prof = {};
            try {
                const r = await fetch(`${API}/professores/${c.id}`);
                if (r.ok) prof = await r.json();
            } catch(e) {}

            const avatarHTML = prof.fotoUrl
                ? `<img src="${SERVER}${prof.fotoUrl}" alt="${prof.nome}">`
                : (prof.nome || c.nome || '?').charAt(0).toUpperCase();

            // Busca meu feedback
            let minhaNotaAtual = 0;
            try {
                const rm = await fetch(`${API}/feedbacks/meu-feedback?professorId=${c.id}&autorId=${userId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (rm.ok) { const d = await rm.json(); minhaNotaAtual = d.nota || 0; }
            } catch(e) {}

            // Busca média
            let media = 0, total = 0;
            try {
                const rf = await fetch(`${API}/feedbacks/professor/${c.id}`);
                if (rf.ok) { const d = await rf.json(); media = d.media; total = d.total; }
            } catch(e) {}

            card.innerHTML = `
                <div class="avatar">${avatarHTML}</div>
                <div class="info">
                    <h3>Prof. ${prof.nome || c.nome}</h3>
                    <span style="background:#4A00B7;color:white;border-radius:20px;padding:2px 10px;font-size:0.8em;">${prof.especialidade || ''}</span>
                    <div style="margin-top:6px;color:#888;font-size:0.85em;">Média: ${'★'.repeat(Math.round(media))}${'☆'.repeat(5-Math.round(media))} ${total > 0 ? media + '/5 (' + total + ' aval.)' : 'Sem avaliações'}</div>
                    <p style="margin:8px 0 4px;font-size:0.9em;color:#555;">Sua avaliação:</p>
                    <div class="estrelas-container" id="estrelas-${c.id}">
                        ${[1,2,3,4,5].map(n => `<span class="est${minhaNotaAtual >= n ? ' ativa' : ''}" data-prof="${c.id}" data-nota="${n}">${minhaNotaAtual >= n ? '★' : '☆'}</span>`).join('')}
                    </div>
                    <p class="msg" id="msg-${c.id}"></p>
                </div>
                <button onclick="removerContratado(${c.id})" style="background:none;border:1px solid #E74C3C;color:#E74C3C;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:0.8em;">Remover</button>
            `;
            lista.appendChild(card);
        }

        // Eventos das estrelas
        document.querySelectorAll('.est').forEach(e => {
            e.addEventListener('click', async () => {
                const profId = parseInt(e.dataset.prof);
                const nota = parseInt(e.dataset.nota);
                document.querySelectorAll(`[data-prof="${profId}"]`).forEach(s => {
                    s.classList.toggle('ativa', parseInt(s.dataset.nota) <= nota);
                    s.innerText = parseInt(s.dataset.nota) <= nota ? '★' : '☆';
                });
                const r = await fetch(`${API}/feedbacks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ professorId: profId, autorId: parseInt(userId), nota })
                });
                if (r.ok) document.getElementById('msg-' + profId).innerText = '⭐ Avaliação salva!';
            });
        });
    }

    function removerContratado(profId) {
        if (!confirm('Remover este professor dos contratados?')) return;
        let contratados = JSON.parse(localStorage.getItem('contratados_' + userId) || '[]');
        contratados = contratados.filter(c => c.id !== profId);
        localStorage.setItem('contratados_' + userId, JSON.stringify(contratados));
        document.getElementById('lista-contratados').innerHTML = '';
        carregarContratados();
    }

    carregarContratados();
</script>
</body>
</html>
